#       memory: 256Mi
#       cpu: 100m

# core:
# jobservice:
# registry:

trivy:
  enabled: true
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 512Mi
  #   limits:
  #     cpu: 1
  #     memory: 1Gi

database:
  type: external
  external:
    host: 192.168.0.243
    port: 5432
    username: "harbor"
    coreDatabase: "harbor"
    existingSecret: harbor-db-password

redis:
  type: external
  external:
    addr: redis-master.redis.svc.cluster.local:6379

