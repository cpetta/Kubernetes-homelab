expose:
  type: route
  route:
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Container Repository
      gethomepage.dev/description: Harbor
      gethomepage.dev/icon: harbor.png
      gethomepage.dev/group: Admin
      gethomepage.dev/href: https://harbor.thegraveshouse.com
      gethomepage.dev/pod-selector: ""
      gethomepage.dev/siteMonitor: https://harbor.thegraveshouse.com
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: traefik-gateway
        namespace: traefik
    hosts:
      - "harbor.thegraveshouse.com"

externalURL: https://harbor.thegraveshouse.com

existingSecretAdminPassword: "harbor-admin-password"
existingSecretAdminPasswordKey: password # (default to HARBOR_ADMIN_PASSWORD)

updateStrategy:
  type: Recreate

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      existingClaim: harbor-registry-pvc
    jobservice:
      jobLog:
        existingClaim: harbor-jobservice-pvc
    trivy:
      existingClaim: harbor-trivy-pvc

containerSecurityContext:
  privileged: true
  allowPrivilegeEscalation: true
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  capabilities:
    drop: []

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

trace:
  enabled: false

cache:
  enabled: false

# portal:
