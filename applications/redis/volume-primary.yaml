apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: redis-primary
  namespace: longhorn-system
spec:
  size: "10737418240"
  numberOfReplicas: 2
  frontend: blockdev
  accessMode: rwo
  dataLocality: disabled
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-primary
spec:
  storageClassName: longhorn
  persistentVolumeReclaimPolicy: Retain
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 10Gi
  csi:
    driver: driver.longhorn.io
    volumeHandle: redis-primary
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-primary-pvc
  namespace: redis
spec:
  volumeName: redis-primary
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi