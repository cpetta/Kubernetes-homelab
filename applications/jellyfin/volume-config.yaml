apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  labels:
    backup-target: default
    longhornvolume: jellyfin-config-volume-rwo
    recurring-job-group.longhorn.io/default: enabled
    recurring-job-group.longhorn.io/level-1: enabled
    setting.longhorn.io/remove-snapshots-during-filesystem-trim: ignored
    setting.longhorn.io/replica-auto-balance: ignored
    setting.longhorn.io/snapshot-data-integrity: ignored
  name: jellyfin-config-volume-rwo
  namespace: longhorn-system
spec:
  size: "10737418240"
  numberOfReplicas: 2
  frontend: blockdev
  accessMode: rwo
  dataLocality: disabled
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-config
spec:
  storageClassName: longhorn
  persistentVolumeReclaimPolicy: Retain
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 10Gi
  csi:
    driver: driver.longhorn.io
    volumeHandle: jellyfin-config-volume-rwo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: jellyfin
spec:
  volumeName: jellyfin-config
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi