apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: homepage
  name: homepage
  namespace: homepage
data:
  bookmarks.yaml: |
    - Bookmarks:
        - Backblaze:
            - abbr: BB
              icon: backblaze.png
              href: https://secure.backblaze.com/b2_buckets.htm
        - Github:
            - abbr: GH
              icon: github.png
              href: https://github.com/cpetta/Kubernetes-homelab
        - Codeberg:
            - abbr: CB
              icon: codeberg.png
              href: https://codeberg.org/chloegraves/kubernetes-homelab
        - Terriform Registry:
            - abbr: TR
              icon: terraform.png
              href: https://registry.terraform.io/
        - Artifact Hub:
            - abbr: AH
              icon: artifacthub.png
              href: https://artifacthub.io/
  custom.css: ""
  custom.js: ""
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
    gateway: true # enable gateway-api
  proxmox.yaml: ""
  services.yaml: |
    - Admin:
        - pm0:
            description: Proxmox Load Balanced
            icon: proxmox.png
            href: https://pm.thegraveshouse.com
            siteMonitor: https://pm.thegraveshouse.com
        - ns1:
            description: Technitium
            icon: technitium.png
            href: https://ns1.thegraveshouse.com:53443
            siteMonitor: https://ns1.thegraveshouse.com:53443
        - ns2:
            description: Technitium
            icon: technitium.png
            href: https://ns2.thegraveshouse.com:53443
            siteMonitor: https://ns2.thegraveshouse.com:53443
        - Vault:
            description: OpenBao
            icon: vault.png
            href: https://vault.thegraveshouse.com
            siteMonitor: https://vault.thegraveshouse.com
