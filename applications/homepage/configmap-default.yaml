    - Apps:
        # https://gethomepage.dev/widgets/services/grafana/
        # - grafana:
        #     widget:
        #       type: grafana
        #       version: 2 # optional, default is 1
        #       alerts: alertmanager # optional, default is grafana
        #       url: http://grafana.thegraveshouse.com
        #       username: admin
        #       password: var.grafana_password
        #       totalalerts: true
        #       alertstriggered: true
        
        - EMail:
            description: Mailu Webmail
            icon: mailu.png
            href: https://mail.thegraveshouse.com/webmail
            siteMonitor: https://mail.thegraveshouse.com/webmail
        - EMail Admin:
            description: Mailu Admin
            icon: mailu.png
            href: https://mail.thegraveshouse.com/admin
            siteMonitor: https://mail.thegraveshouse.com/admin
  settings.yaml: |
    theme: dark
    color: slate
    layout:
      Media:
        style: row
        columns: 4
    headerStyle: boxedWidgets
    base: https://thegraveshouse.com
    showStats: false # all docker or proxmox stats
    statusStyle: "dot"
    # disableCollapse: true
    providers:
      longhorn:
        url: http://longhorn-frontend.longhorn-system.svc.cluster.local:80
  widgets.yaml: |
    - logo:
        icon: https://www.svgrepo.com/show/530679/gene-sequencing.svg
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          hour12: true
    - datetime:
        text_size: xl
        format:
          dateStyle: short
    - openmeteo:
        label: Weather
        latitude: 42.93154
        longitude: -85.68632
        units: imperial # or metric
        cache: 60 # Time in minutes to cache API responses, to stay within limits
        # format: # optional, Intl.NumberFormat options
        maximumFractionDigits: 1
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Cluster"
        nodes:
          show: false
          cpu: false
          memory: false
          showLabel: false
    - longhorn:
        expanded: true
        total: true
        labels: true
        nodes: false
    # - resources:
    #     backend: resources
    #     expanded: true
    #     cpu: true
    #     memory: true
    #     network: default
    - search:
        provider: duckduckgo
        target: _blank