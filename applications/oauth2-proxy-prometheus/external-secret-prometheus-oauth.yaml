apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-prometheus
  namespace: metrics
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: metrics
    kind: SecretStore
  target:
    name: oauth2-proxy-prometheus # name of created secret
  data:
  - secretKey: client_id # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: prometheus-oauth
      property: client_id
  - secretKey: client_secret # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: prometheus-oauth
      property: client_secret