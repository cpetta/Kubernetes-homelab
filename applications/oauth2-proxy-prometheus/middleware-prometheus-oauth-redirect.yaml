apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: metrics-prometheus-oauth-redirect
  namespace: metrics
spec:
  forwardAuth:
    address: http://oauth2-proxy-metrics-prometheus.metrics.svc.cluster.local:80
    authResponseHeaders:
    - X-Auth-Request-Access-Token
    - Authorization
    maxBodySize: 1048576
    maxResponseBodySize: 1048576
    trustForwardHeader: true
