apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cert-staging
  namespace: traefik
spec:
  commonName: '*.thegraveshouse.com'
  dnsNames:
  - thegraveshouse.com
  - '*.thegraveshouse.com'
  issuerRef:
    kind: Issuer
    name: cloudflare-staging
  secretName: wildcard-cert-staging
