apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-traefik
  namespace: traefik
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: traefik
    kind: SecretStore
  target:
    name: traefik-oauth2-proxy # name of created secret
  data:
  - secretKey: client-id # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: traefik-oauth
      property: client_id
  - secretKey: client-secret # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: traefik-oauth
      property: client_secret
  - secretKey: cookie-secret # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: traefik-oauth
      property: client_secret