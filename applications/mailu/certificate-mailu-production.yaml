apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mailu-certificate-prod
  namespace: mailu
spec:
  dnsNames:
  - mail.thegraveshouse.com
  - imap.thegraveshouse.com
  - smtp.thegraveshouse.com
  - pop3.thegraveshouse.com
  issuerRef:
    kind: ClusterIssuer
    name: cloudflare
  secretName: mailu-certificate