apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mailu-db
  namespace: mailu
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: mailu
    kind: SecretStore
  target:
    name: mailu-db # name of created secret
  data:
  - secretKey: database # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: mailu-db # name of kv secret
      property: database
  - secretKey: username # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: mailu-db # name of kv secret
      property: username
  - secretKey: password # name of created secret key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
      key: mailu-db # name of kv secret
      property: password