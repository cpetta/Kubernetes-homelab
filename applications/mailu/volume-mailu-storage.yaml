apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: mailu-storage
  namespace: longhorn-system
spec:
  size: "107374182400"
  numberOfReplicas: 3
  frontend: blockdev
  accessMode: rwx
  dataLocality: disabled
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mailu-storage
spec:
  storageClassName: longhorn
  persistentVolumeReclaimPolicy: Retain
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 100Gi
  csi:
    driver: driver.longhorn.io
    volumeHandle: mailu-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailu-storage-pvc
  namespace: mailu
spec:
  volumeName: mailu-storage
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 100Gi